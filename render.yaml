services:
  - type: web
    name: job-scrapper-scrapers
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: node index.js
    rootDir: scrapers
    envVars:
      - key: PORT
        value: "3001"

  - type: web
    name: job-scrapper-backend
    runtime: go
    plan: free
    buildCommand: go build -o main .
    startCommand: ./main
    rootDir: backend
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: SCRAPER_SERVICE_URL
        fromService:
          type: web
          name: job-scrapper-scrapers
          property: host
      - key: DISCORD_WEBHOOK_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false

  - type: cron
    name: periodic-scrape
    runtime: node
    plan: free
    schedule: "0 */6 * * *"
    buildCommand: ""
    startCommand: "curl -X POST $BACKEND_URL/api/scrape"
    envVars:
      - key: BACKEND_URL
        fromService:
          type: web
          name: job-scrapper-backend
          property: url

  - type: static
    name: job-scrapper-frontend
    plan: free
    buildCommand: npm install && npm run build
    publishPath: dist
    rootDir: frontend
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: job-scrapper-backend
          property: url
